# ============================================================
# Healthcare Pipeline — CI/CD Deployment
#
# Triggers on every push to main, or manually from GitHub UI.
# Runs two jobs in parallel:
#   deploy-lambdas  →  package + deploy all 3 Lambda functions
#   deploy-glue     →  upload ETL scripts to S3
#
# GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
#   AWS_ACCESS_KEY_ID       your IAM user access key
#   AWS_SECRET_ACCESS_KEY   your IAM user secret key
#   LAMBDA_ROLE_ARN         arn:aws:iam::<account>:role/healthcare-lambda-role
#
# GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   CMS_RAW_BUCKET          healthcare-cms-claims-raw
#   EHR_RAW_BUCKET          healthcare-ehr-raw
#   CMS_CLEAN_BUCKET        healthcare-cms-claims-clean
#   EHR_CLEAN_BUCKET        healthcare-ehr-clean
#   CMS_LAMBDA_NAME         cms-claims-generator
#   FHIR_LAMBDA_NAME        fhir-ehr-generator
#   TRIGGER_LAMBDA_NAME     api-trigger
#   CMS_GLUE_JOB            cms-claims-etl
#   EHR_GLUE_JOB            ehr-fhir-etl
# ============================================================

name: Deploy Healthcare Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2

jobs:

  # ----------------------------------------------------------
  # Job 1: Package and deploy all 3 Lambda functions
  # ----------------------------------------------------------
  deploy-lambdas:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      # ---- cms-claims-generator ----
      - name: Package cms-claims-generator
        run: |
          cd src/lambdas/cms_claims_generator
          mkdir -p package
          pip install -r requirements.txt -t ./package --quiet
          cp *.py ./package/
          cd package && zip -r ../../../../cms_claims_generator.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy cms-claims-generator
        run: |
          FUNCTION="${{ vars.CMS_LAMBDA_NAME }}"
          ROLE="${{ secrets.LAMBDA_ROLE_ARN }}"

          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --zip-file fileb://cms_claims_generator.zip \
            --region us-east-2 \
          || aws lambda create-function \
            --function-name "$FUNCTION" \
            --runtime python3.11 \
            --role "$ROLE" \
            --handler handler.handler \
            --zip-file fileb://cms_claims_generator.zip \
            --timeout 300 \
            --memory-size 512 \
            --environment "Variables={RAW_CMS_BUCKET=${{ vars.CMS_RAW_BUCKET }},RECORDS_PER_BATCH=500}" \
            --region us-east-2

          aws lambda wait function-updated \
            --function-name "$FUNCTION" \
            --region us-east-2

          echo "cms-claims-generator deployed"

      # ---- fhir-ehr-generator ----
      - name: Package fhir-ehr-generator
        run: |
          cd src/lambdas/fhir_generator
          mkdir -p package
          pip install -r requirements.txt -t ./package --quiet
          cp *.py ./package/
          cd package && zip -r ../../../../fhir_generator.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy fhir-ehr-generator
        run: |
          FUNCTION="${{ vars.FHIR_LAMBDA_NAME }}"
          ROLE="${{ secrets.LAMBDA_ROLE_ARN }}"

          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --zip-file fileb://fhir_generator.zip \
            --region us-east-2 \
          || aws lambda create-function \
            --function-name "$FUNCTION" \
            --runtime python3.11 \
            --role "$ROLE" \
            --handler handler.handler \
            --zip-file fileb://fhir_generator.zip \
            --timeout 300 \
            --memory-size 512 \
            --environment "Variables={RAW_EHR_BUCKET=${{ vars.EHR_RAW_BUCKET }},PATIENTS_PER_BATCH=200}" \
            --region us-east-2

          aws lambda wait function-updated \
            --function-name "$FUNCTION" \
            --region us-east-2

          echo "fhir-ehr-generator deployed"

      # ---- api-trigger ----
      - name: Package api-trigger
        run: |
          cd src/lambdas/api_trigger
          mkdir -p package
          pip install -r requirements.txt -t ./package --quiet
          cp *.py ./package/
          cd package && zip -r ../../../../api_trigger.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy api-trigger
        run: |
          FUNCTION="${{ vars.TRIGGER_LAMBDA_NAME }}"
          ROLE="${{ secrets.LAMBDA_ROLE_ARN }}"

          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --zip-file fileb://api_trigger.zip \
            --region us-east-2 \
          || aws lambda create-function \
            --function-name "$FUNCTION" \
            --runtime python3.11 \
            --role "$ROLE" \
            --handler handler.handler \
            --zip-file fileb://api_trigger.zip \
            --timeout 30 \
            --memory-size 128 \
            --environment "Variables={CMS_LAMBDA_NAME=${{ vars.CMS_LAMBDA_NAME }},FHIR_LAMBDA_NAME=${{ vars.FHIR_LAMBDA_NAME }}}" \
            --region us-east-2

          aws lambda wait function-updated \
            --function-name "$FUNCTION" \
            --region us-east-2

          echo "api-trigger deployed"

  # ----------------------------------------------------------
  # Job 2: Upload Glue ETL scripts to S3
  # ----------------------------------------------------------
  deploy-glue:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: Upload Glue ETL scripts to S3
        run: |
          aws s3 cp src/glue/cms_claims_etl.py \
            s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/cms_claims_etl.py \
            --region us-east-2

          aws s3 cp src/glue/ehr_fhir_etl.py \
            s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/ehr_fhir_etl.py \
            --region us-east-2

          echo "Uploaded:"
          echo "  s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/cms_claims_etl.py"
          echo "  s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/ehr_fhir_etl.py"

      - name: Update Glue job script locations
        run: |
          aws glue update-job \
            --job-name "${{ vars.CMS_GLUE_JOB }}" \
            --job-update "Command={Name=glueetl,ScriptLocation=s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/cms_claims_etl.py,PythonVersion=3}" \
            --region us-east-2 \
          && echo "Updated Glue job: ${{ vars.CMS_GLUE_JOB }}" \
          || echo "WARNING: ${{ vars.CMS_GLUE_JOB }} not found — create it in Glue console first."

          aws glue update-job \
            --job-name "${{ vars.EHR_GLUE_JOB }}" \
            --job-update "Command={Name=glueetl,ScriptLocation=s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/ehr_fhir_etl.py,PythonVersion=3}" \
            --region us-east-2 \
          && echo "Updated Glue job: ${{ vars.EHR_GLUE_JOB }}" \
          || echo "WARNING: ${{ vars.EHR_GLUE_JOB }} not found — create it in Glue console first."
