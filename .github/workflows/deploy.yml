# ============================================================
# Healthcare Pipeline — CI/CD Deployment
#
# Triggers on every push to main.
# Deploys only what changed using path filters:
#   - src/lambdas/**  →  package + update Lambda functions
#   - src/glue/**     →  upload ETL scripts to S3
#
# GitHub Secrets required (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID       your IAM user access key
#   AWS_SECRET_ACCESS_KEY   your IAM user secret key
#   LAMBDA_ROLE_ARN         arn:aws:iam::<account>:role/healthcare-lambda-role
#
# GitHub Variables (Settings → Variables → Actions):
#   AWS_REGION              us-east-2
#   CMS_RAW_BUCKET          healthcare-cms-claims-raw
#   EHR_RAW_BUCKET          healthcare-ehr-raw
#   CMS_CLEAN_BUCKET        healthcare-cms-claims-clean
#   EHR_CLEAN_BUCKET        healthcare-ehr-clean
#   CMS_LAMBDA_NAME         cms-claims-generator
#   FHIR_LAMBDA_NAME        fhir-ehr-generator
#   TRIGGER_LAMBDA_NAME     api-trigger
#   CMS_GLUE_JOB            cms-claims-etl
#   EHR_GLUE_JOB            ehr-fhir-etl
# ============================================================

name: Deploy Healthcare Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from GitHub UI

# Prevent concurrent deploys stomping each other
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------------------------
  # Job 1: Detect which parts of the codebase changed
  # ----------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      lambdas: ${{ steps.filter.outputs.lambdas }}
      glue:    ${{ steps.filter.outputs.glue }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lambdas:
              - 'src/lambdas/**'
            glue:
              - 'src/glue/**'

  # ----------------------------------------------------------
  # Job 2: Package and deploy Lambda functions
  # ----------------------------------------------------------
  deploy-lambdas:
    needs: changes
    if: needs.changes.outputs.lambdas == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ---- cms-claims-generator ----
      - name: Package cms-claims-generator
        run: |
          cd src/lambdas/cms_claims_generator
          pip install -r requirements.txt -t ./package --quiet
          cp *.py ./package/
          cd package && zip -r ../../../../cms_claims_generator.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy cms-claims-generator
        run: |
          FUNCTION="${{ vars.CMS_LAMBDA_NAME }}"
          ZIP="fileb://cms_claims_generator.zip"
          ROLE="${{ secrets.LAMBDA_ROLE_ARN }}"
          REGION="${{ vars.AWS_REGION }}"

          # Update code if function exists, otherwise create it
          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --zip-file "$ZIP" \
            --region "$REGION" \
          || aws lambda create-function \
            --function-name "$FUNCTION" \
            --runtime python3.11 \
            --role "$ROLE" \
            --handler handler.handler \
            --zip-file "$ZIP" \
            --timeout 300 \
            --memory-size 512 \
            --environment "Variables={ \
              RAW_CMS_BUCKET=${{ vars.CMS_RAW_BUCKET }}, \
              RECORDS_PER_BATCH=500 \
            }" \
            --region "$REGION"

          # Wait for update to finish
          aws lambda wait function-updated --function-name "$FUNCTION" --region "$REGION"

          # Sync env vars (only runs on update path — no-op on create)
          aws lambda update-function-configuration \
            --function-name "$FUNCTION" \
            --environment "Variables={ \
              RAW_CMS_BUCKET=${{ vars.CMS_RAW_BUCKET }}, \
              RECORDS_PER_BATCH=500 \
            }" \
            --region "$REGION" 2>/dev/null || true

      # ---- fhir-ehr-generator ----
      - name: Package fhir-ehr-generator
        run: |
          cd src/lambdas/fhir_generator
          pip install -r requirements.txt -t ./package --quiet
          cp *.py ./package/
          cd package && zip -r ../../../../fhir_generator.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy fhir-ehr-generator
        run: |
          FUNCTION="${{ vars.FHIR_LAMBDA_NAME }}"
          ZIP="fileb://fhir_generator.zip"
          ROLE="${{ secrets.LAMBDA_ROLE_ARN }}"
          REGION="${{ vars.AWS_REGION }}"

          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --zip-file "$ZIP" \
            --region "$REGION" \
          || aws lambda create-function \
            --function-name "$FUNCTION" \
            --runtime python3.11 \
            --role "$ROLE" \
            --handler handler.handler \
            --zip-file "$ZIP" \
            --timeout 300 \
            --memory-size 512 \
            --environment "Variables={ \
              RAW_EHR_BUCKET=${{ vars.EHR_RAW_BUCKET }}, \
              PATIENTS_PER_BATCH=200 \
            }" \
            --region "$REGION"

          aws lambda wait function-updated --function-name "$FUNCTION" --region "$REGION"

          aws lambda update-function-configuration \
            --function-name "$FUNCTION" \
            --environment "Variables={ \
              RAW_EHR_BUCKET=${{ vars.EHR_RAW_BUCKET }}, \
              PATIENTS_PER_BATCH=200 \
            }" \
            --region "$REGION" 2>/dev/null || true

      # ---- api-trigger ----
      - name: Package api-trigger
        run: |
          cd src/lambdas/api_trigger
          pip install -r requirements.txt -t ./package --quiet
          cp *.py ./package/
          cd package && zip -r ../../../../api_trigger.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy api-trigger
        run: |
          FUNCTION="${{ vars.TRIGGER_LAMBDA_NAME }}"
          ZIP="fileb://api_trigger.zip"
          ROLE="${{ secrets.LAMBDA_ROLE_ARN }}"
          REGION="${{ vars.AWS_REGION }}"

          aws lambda update-function-code \
            --function-name "$FUNCTION" \
            --zip-file "$ZIP" \
            --region "$REGION" \
          || aws lambda create-function \
            --function-name "$FUNCTION" \
            --runtime python3.11 \
            --role "$ROLE" \
            --handler handler.handler \
            --zip-file "$ZIP" \
            --timeout 30 \
            --memory-size 128 \
            --environment "Variables={ \
              CMS_LAMBDA_NAME=${{ vars.CMS_LAMBDA_NAME }}, \
              FHIR_LAMBDA_NAME=${{ vars.FHIR_LAMBDA_NAME }} \
            }" \
            --region "$REGION"

          aws lambda wait function-updated --function-name "$FUNCTION" --region "$REGION"

          aws lambda update-function-configuration \
            --function-name "$FUNCTION" \
            --environment "Variables={ \
              CMS_LAMBDA_NAME=${{ vars.CMS_LAMBDA_NAME }}, \
              FHIR_LAMBDA_NAME=${{ vars.FHIR_LAMBDA_NAME }} \
            }" \
            --region "$REGION" 2>/dev/null || true

  # ----------------------------------------------------------
  # Job 3: Upload Glue ETL scripts to S3
  # ----------------------------------------------------------
  deploy-glue:
    needs: changes
    if: needs.changes.outputs.glue == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Upload Glue ETL scripts to S3
        run: |
          aws s3 cp src/glue/cms_claims_etl.py \
            s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/cms_claims_etl.py

          aws s3 cp src/glue/ehr_fhir_etl.py \
            s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/ehr_fhir_etl.py

          echo "Scripts uploaded:"
          echo "  s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/cms_claims_etl.py"
          echo "  s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/ehr_fhir_etl.py"

      - name: Update Glue job script locations
        run: |
          REGION="${{ vars.AWS_REGION }}"

          aws glue update-job \
            --job-name "${{ vars.CMS_GLUE_JOB }}" \
            --job-update "Command={Name=glueetl,ScriptLocation=s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/cms_claims_etl.py,PythonVersion=3}" \
            --region "$REGION" 2>/dev/null \
          && echo "Updated Glue job: ${{ vars.CMS_GLUE_JOB }}" \
          || echo "Glue job ${{ vars.CMS_GLUE_JOB }} not found — create it manually in console first."

          aws glue update-job \
            --job-name "${{ vars.EHR_GLUE_JOB }}" \
            --job-update "Command={Name=glueetl,ScriptLocation=s3://${{ vars.CMS_RAW_BUCKET }}/glue-scripts/ehr_fhir_etl.py,PythonVersion=3}" \
            --region "$REGION" 2>/dev/null \
          && echo "Updated Glue job: ${{ vars.EHR_GLUE_JOB }}" \
          || echo "Glue job ${{ vars.EHR_GLUE_JOB }} not found — create it manually in console first."
